<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>財表理論アプリ</title>
<style>
:root{--ink:#18212f;--muted:#667085;--line:#dbe1ea;--paper:#fff;--soft:#f3f6fa;--main:#0f766e;--sub:#bc6c25}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;color:var(--ink);background:linear-gradient(180deg,#e8f3f1,transparent 260px),var(--soft)}a{text-decoration:none;color:inherit}button,textarea,select,input{font:inherit}main{max-width:1080px;margin:auto;padding:22px 16px 88px}.hero,.panel,.q,.answer,.stats div{background:var(--paper);border:1px solid var(--line);border-radius:8px;box-shadow:0 14px 36px #18212f14}.hero{display:grid;grid-template-columns:1fr auto;gap:18px;align-items:end;padding:26px}.eyebrow{margin:0 0 8px;color:var(--main);font-weight:800}.hero h1{font-size:clamp(28px,5vw,46px);line-height:1.08;margin:0 0 10px}.lead{color:var(--muted);line-height:1.8;margin:0}.primary,button{border:0;border-radius:8px;background:var(--main);color:white;font-weight:800;padding:12px 16px;cursor:pointer}.ghost{border:1px solid var(--line);background:white;color:var(--muted)}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}.stats div{padding:16px}.stats span,.muted,small{color:var(--muted)}.stats strong{display:block;font-size:28px;margin-top:5px}.panel,.q,.answer{padding:20px;margin-top:16px}.head{display:flex;justify-content:space-between;gap:12px;align-items:center}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.mode{min-height:82px;text-align:left;color:var(--ink);background:#f8fafc;border:1px solid var(--line);display:grid;gap:5px}.mode.active{background:var(--main);border-color:var(--main);color:white}.mode.active small{color:#ffffffc9}.filters{display:grid;grid-template-columns:1fr 160px;gap:12px}.filters label{display:grid;gap:7px;color:var(--muted);font-weight:700}select,input,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:12px;background:white}.list{display:grid;gap:10px}.row{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;border:1px solid var(--line);border-radius:8px;background:white;padding:13px}.row strong{display:block;line-height:1.45}.row span{display:block;margin-top:4px;color:var(--muted);font-size:13px}.badge{min-width:42px;height:42px;display:grid;place-items:center;border-radius:8px;background:var(--sub);color:white;font-weight:900}.top{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center}.top h1{font-size:22px;margin:0}.meta,.keys{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}.meta span,.keys span{background:#edf2f7;border-radius:999px;padding:6px 10px;color:var(--muted);font-size:13px;font-weight:700}.q h2{font-size:24px;line-height:1.5}textarea{min-height:210px;line-height:1.75}.actions,.score{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}.actions button:first-child,.score button{background:#edf2f7;color:var(--ink)}.score button{width:44px;height:44px;padding:0}.score button.on{background:var(--sub);color:white}.answer{display:none}.answer.show{display:block}.answer p{line-height:1.8;white-space:pre-wrap}.outline{background:#f8fafc;border-radius:8px;padding:12px;color:var(--muted)}.bar{position:relative;display:grid;grid-template-columns:1fr auto;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);overflow:hidden}.bar i{position:absolute;left:0;bottom:0;height:3px;background:var(--main)}nav{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);width:min(520px,calc(100% - 24px));display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px;border:1px solid var(--line);border-radius:8px;background:#fffffff0;box-shadow:0 12px 32px #18212f29}nav a{text-align:center;border-radius:8px;padding:11px;color:var(--muted);font-weight:800}nav a.on{background:var(--ink);color:white}@media(max-width:720px){main{padding:14px 12px 88px}.hero,.top,.stats,.grid,.filters{grid-template-columns:1fr}.hero,.panel,.q,.answer{padding:18px}.primary,.ghost{width:100%;text-align:center}}
</style>
</head>
<body><div id="app"></div><script>
const cards=[
['01-001','B','第1章 財務諸表論の基礎概念','企業会計の意義','財務会計の機能を2つ示しなさい。','情報提供機能 / 利害調整機能','財務会計の機能は、投資者等の意思決定に役立つ情報を提供する情報提供機能と、利害関係者間の利害を調整する利害調整機能である。'],
['01-002','B','第1章 財務諸表論の基礎概念','資本循環','資本循環の流れを3段階で示しなさい。','資本調達 / 資本投下 / 資本回収','企業は資本を調達し、その資本を事業活動へ投下し、販売や回収を通じて資本を回収する。この循環を財務諸表によって報告する。'],
['01-003','A','第1章 財務諸表論の基礎概念','会計公準','会計公準を3つ挙げ、それぞれ簡潔に説明しなさい。','企業実体の公準 / 継続企業の公準 / 貨幣的評価の公準','企業実体の公準は企業を所有者から独立した会計単位とみる前提である。継続企業の公準は企業が継続して活動する前提である。貨幣的評価の公準は会計測定を貨幣額で行う前提である。'],
['02-004','A','第2章 一般原則','真実性の原則','真実性の原則の内容を述べなさい。','真実な報告 / 財政状態 / 経営成績','企業会計は、企業の財政状態および経営成績に関して、真実な報告を提供するものでなければならない。'],
['02-005','A','第2章 一般原則','正規の簿記の原則','正規の簿記の原則の要請を説明しなさい。','正確な会計帳簿 / 誘導法 / 財務諸表','すべての取引について、正規の簿記の原則に従い、正確な会計帳簿を作成し、その帳簿を基礎として財務諸表を作成することが求められる。'],
['02-006','S','第2章 一般原則','資本・利益区別の原則','資本取引と損益取引を区別すべき理由を述べなさい。','資本取引 / 損益取引 / 期間損益計算','資本取引と損益取引を混同すると、企業の期間損益が適正に算定されない。そのため、株主資本そのものの増減と、事業活動から生じた利益の増減を明確に区別する必要がある。'],
['02-007','B','第2章 一般原則','明瞭性の原則','明瞭性の原則が求める表示を説明しなさい。','利害関係者 / 必要な会計事実 / 明瞭表示','財務諸表は、利害関係者に必要な会計事実を明瞭に表示し、企業の状況について判断を誤らせないように作成されなければならない。'],
['02-008','A','第2章 一般原則','継続性の原則','継続性の原則の趣旨を説明しなさい。','処理原則 / 手続 / 毎期継続','企業会計上の処理原則や手続は、毎期継続して適用し、みだりに変更してはならない。これにより期間比較可能性が保たれる。'],
['02-009','A','第2章 一般原則','保守主義の原則','保守主義の原則の内容を述べなさい。','慎重な判断 / 財政に不利な影響 / 適正な処理','企業の財政に不利な影響を及ぼす可能性がある場合には、これに備えて慎重な判断に基づく会計処理を行うことが求められる。'],
['02-010','B','第2章 一般原則','単一性の原則','単一性の原則を説明しなさい。','目的別財務諸表 / 信頼しうる会計記録 / 事実のゆがめ禁止','異なる目的の財務諸表を作成する場合でも、信頼しうる会計記録に基づき、事実をゆがめて表示してはならない。'],
['03-011','A','第3章 損益会計','発生主義','発生主義の考え方を説明しなさい。','現金収支 / 経済価値 / 発生事実','発生主義とは、現金の収支時点ではなく、経済価値の増減をもたらす事実が発生した時点で費用または収益を認識する考え方である。'],
['03-012','S','第3章 損益会計','費用収益対応','費用収益対応の原則を説明しなさい。','収益 / 費用 / 対応表示','一定期間の経営成績を適正に示すため、収益とその獲得に貢献した費用を対応させて認識・表示することが求められる。']
].map(x=>({id:x[0],rank:x[1],chapter:x[2],section:x[3],q:x[4],keys:x[5],a:x[6]}));
const modes=['章集中','要点確認','キーワード暗記','答案演習','白紙再現','弱点特訓','横断復習','過去・直前','本番タイマー'];
const $=s=>document.querySelector(s), key='zaimuProgress.gh', pref='zaimuPref.gh';
let state=JSON.parse(localStorage[key]||'{}'), opt=Object.assign({mode:'章集中',chapter:'all',daily:12},JSON.parse(localStorage[pref]||'{}'));
function save(){localStorage[key]=JSON.stringify(state);localStorage[pref]=JSON.stringify(opt)}
function deck(){let d=[...cards];if(opt.chapter!='all'&&opt.mode!='横断復習')d=d.filter(c=>c.chapter==opt.chapter);if(opt.mode=='弱点特訓'){let w=d.filter(c=>(state[c.id]?.score||5)<=3&&state[c.id]?.done);if(w.length)d=w}if(opt.mode=='過去・直前')d=d.filter(c=>c.rank!='B');return d.slice(0,opt.daily)}
function row(c){let r=state[c.id]||{};return `<a class="row" href="#/study/${c.id}"><div><strong>${c.id} ${c.q}</strong><span>${c.chapter} / ${c.section}</span></div><em class="badge">${r.score?r.score+'/5':c.rank}</em></a>`}
function nav(a){let first=(deck()[0]||cards[0]).id;return `<nav><a class="${a=='home'?'on':''}" href="#/">ホーム</a><a class="${a=='study'?'on':''}" href="#/study/${first}">学習</a><a class="${a=='analysis'?'on':''}" href="#/analysis">分析</a></nav>`}
function home(){let d=deck(),done=cards.filter(c=>state[c.id]?.done).length,weak=cards.filter(c=>(state[c.id]?.score||9)<=3).length,chap=[...new Set(cards.map(c=>c.chapter))];$('#app').innerHTML=`<main><section class="hero"><div><p class="eyebrow">財表理論アプリ</p><h1>答案として出せるまで、12問ずつ回す。</h1><p class="lead">章集中、暗記、答案演習、弱点復習、本番タイマーまで、この画面から始められます。</p></div><a class="primary" href="#/study/${d[0].id}">学習開始</a></section><section class="stats"><div><span>完了</span><strong>${done}/${cards.length}</strong></div><div><span>今日の問題</span><strong>${d.length}</strong></div><div><span>弱点</span><strong>${weak}</strong></div></section><section class="panel"><div class="head"><h2>学習モード</h2><span class="muted">${opt.mode}</span></div><div class="grid">${modes.map(m=>`<button class="mode ${m==opt.mode?'active':''}" onclick="opt.mode='${m}';save();home()"><strong>${m}</strong><small>${m=='横断復習'?'章をまたいで確認':m=='本番タイマー'?'15分で解く':'目的別に回す'}</small></button>`).join('')}</div></section><section class="panel filters"><label>章<select onchange="opt.chapter=this.value;save();home()"><option value="all">全章</option>${chap.map(c=>`<option ${c==opt.chapter?'selected':''}>${c}</option>`).join('')}</select></label><label>問題数<input type="number" min="3" max="30" value="${opt.daily}" onchange="opt.daily=+this.value;save();home()"></label></section><section class="panel"><div class="head"><h2>今日の12問</h2><span class="muted">${d.length}問</span></div><div class="list">${d.map(row).join('')}</div></section></main>${nav('home')}`}
function study(id){let d=deck(),c=cards.find(x=>x.id==id)||d[0],i=d.findIndex(x=>x.id==c.id),n=(d[i+1]||d[0]||cards[0]),r=state[c.id]||{},kw=c.keys.split(/\s*\/\s*/);$('#app').innerHTML=`<main><section class="hero top"><a class="ghost" href="#/">戻る</a><div><p class="eyebrow">${opt.mode}</p><h1>${c.id} ${c.chapter}</h1></div><span class="badge">${c.rank}</span></section><section class="q"><div class="meta"><span>${c.rank}ランク</span><span>${c.section}</span></div><h2>${c.q}</h2>${opt.mode=='キーワード暗記'?`<div class="keys">${kw.map(k=>`<span>${k}</span>`).join('')}</div>`:''}<textarea id="ans" placeholder="ここに答案を書きます。">${r.answer||''}</textarea><div class="actions"><button class="ghost" onclick="record('${c.id}')">保存</button><button onclick="record('${c.id}');$('.answer').classList.add('show')">解答を見る</button></div></section><section class="answer"><p class="eyebrow">模範解答</p><p>${c.a}</p><div class="outline">${c.keys}</div><div class="score">${[1,2,3,4,5].map(s=>`<button class="${r.score==s?'on':''}" onclick="score('${c.id}',${s})">${s}</button>`).join('')}</div><p><a class="primary" href="#/study/${n.id}">次へ</a></p></section></main>${nav('study')}`}
function record(id){state[id]=Object.assign(state[id]||{},{answer:$('#ans').value});save()}function score(id,s){record(id);state[id]=Object.assign(state[id],{score:s,done:true,date:new Date().toISOString().slice(0,10)});save();study(id)}
function analysis(){let done=cards.filter(c=>state[c.id]?.done),avg=done.length?done.reduce((a,c)=>a+(state[c.id].score||0),0)/done.length:0,chap=[...new Set(cards.map(c=>c.chapter))],weak=cards.filter(c=>(state[c.id]?.score||9)<=3);$('#app').innerHTML=`<main><section class="hero"><div><p class="eyebrow">分析</p><h1>次にやるべきところを絞る。</h1></div><a class="primary" href="#/">学習へ</a></section><section class="stats"><div><span>平均評価</span><strong>${avg?avg.toFixed(1):'-'}</strong></div><div><span>完了</span><strong>${done.length}/${cards.length}</strong></div><div><span>弱点</span><strong>${weak.length}</strong></div></section><section class="panel"><h2>章別進捗</h2>${chap.map(ch=>{let a=cards.filter(c=>c.chapter==ch),b=a.filter(c=>state[c.id]?.done).length;return `<div class="bar"><span>${ch}</span><strong>${b}/${a.length}</strong><i style="width:${b/a.length*100}%"></i></div>`}).join('')}</section><section class="panel"><h2>弱点リスト</h2><div class="list">${(weak.length?weak:cards.slice(0,3)).map(row).join('')}</div></section></main>${nav('analysis')}`}
function render(){let h=location.hash.replace('#/','');h.startsWith('study/')?study(h.split('/')[1]):h=='analysis'?analysis():home()}addEventListener('hashchange',render);render();
</script></body></html>
